<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Owen's World">
  <title>Owen's World 🍄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #5B9BD5;
      font-family: 'Nunito', sans-serif;
      touch-action: manipulation;
    }

    .app {
      width: 100%;
      height: 100vh;
      background: linear-gradient(180deg, #5B9BD5 0%, #87CEEB 35%, #4CAF50 35%, #388E3C 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* CLOUDS */
    .clouds { position: absolute; top: 0; left: 0; right: 0; height: 140px; pointer-events: none; z-index: 0; }
    .cloud { position: absolute; background: white; border-radius: 50px; opacity: .9; }
    .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
    .c1 { width: 90px; height: 30px; top: 20px; left: 5%; }
    .c1::before { width: 44px; height: 44px; top: -22px; left: 12px; }
    .c1::after { width: 34px; height: 34px; top: -16px; left: 42px; }
    .c2 { width: 110px; height: 36px; top: 45px; left: 35%; }
    .c2::before { width: 54px; height: 54px; top: -28px; left: 16px; }
    .c2::after { width: 40px; height: 40px; top: -20px; left: 54px; }
    .c3 { width: 78px; height: 26px; top: 14px; right: 8%; }
    .c3::before { width: 38px; height: 38px; top: -20px; left: 10px; }
    .c3::after { width: 30px; height: 30px; top: -14px; left: 36px; }

    /* HEADER */
    .header {
      position: relative; z-index: 10;
      text-align: center;
      padding: 18px 16px 10px;
      flex-shrink: 0;
    }

    .title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2.5vw, 16px);
      color: #FFD700;
      text-shadow: 2px 2px 0 #8B0000, -1px -1px 0 #8B0000, 1px -1px 0 #8B0000, -1px 1px 0 #8B0000;
      line-height: 1.8;
      margin-bottom: 6px;
    }

    .hud {
      display: flex; justify-content: center; gap: 10px; margin-bottom: 6px;
    }

    .hud-item {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.6vw, 11px);
      color: #FFD700;
      text-shadow: 1px 1px 0 #8B0000;
      background: rgba(0,0,0,0.28);
      padding: 5px 10px;
      border-radius: 6px;
    }

    .coin-spin { display: inline-block; animation: coinSpin 2s infinite; }
    @keyframes coinSpin { 0%,100%{transform:scaleX(1);}50%{transform:scaleX(0.15);} }

    .diff-bar { display: flex; justify-content: center; gap: 6px; }
    .diff-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(6px, 1.4vw, 9px);
      padding: 6px 12px;
      border-radius: 6px;
      border: 2px solid rgba(0,0,0,0.3);
      cursor: pointer;
      color: white;
      background: rgba(0,0,0,0.2);
      touch-action: manipulation;
    }
    .diff-btn.active { background: #FFD700; color: #8B0000; border-color: #8B0000; }

    /* NAV */
    .main { position: relative; z-index: 10; flex: 1; overflow: hidden; padding: 8px 12px 4px; display: flex; flex-direction: column; }

    .nav-tabs {
      display: flex; gap: 6px; justify-content: center; flex-shrink: 0; margin-bottom: 8px;
    }

    .tab-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(6px, 1.4vw, 8px);
      padding: 8px 12px;
      border: 3px solid #8B0000;
      border-radius: 7px;
      cursor: pointer;
      background: #E53935;
      color: white;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
      box-shadow: 0 3px 0 #8B0000;
      line-height: 1.5;
      text-align: center;
      touch-action: manipulation;
      transition: transform .1s;
    }
    .tab-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #8B0000; }
    .tab-btn.active { background: #FFD700; color: #8B0000; border-color: #8B0000; }

    /* PANELS */
    .panels { flex: 1; overflow: hidden; position: relative; }

    .game-panel {
      display: none;
      background: rgba(255,255,255,0.96);
      border-radius: 12px;
      border: 4px solid #8B0000;
      padding: 14px 14px 10px;
      box-shadow: 0 4px 0 #8B0000;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .game-panel.active { display: block; }

    .game-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.8vw, 11px);
      color: #E53935;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 1px 1px 0 #8B0000;
    }

    /* MEMORY */
    .memory-grid { display: grid; gap: 7px; max-width: 400px; margin: 0 auto; }
    .mem-card {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 3px solid #E53935;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: #E53935;
      user-select: none;
      box-shadow: 0 3px 0 #8B0000;
      position: relative;
      transition: transform .2s;
      touch-action: manipulation;
    }
    .mem-card .back {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #E53935; border-radius: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 2vw, 16px); color: white;
    }
    .mem-card .front { display: none; font-size: clamp(20px, 4vw, 30px); }
    .mem-card.flipped .back { display: none; }
    .mem-card.flipped .front { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .mem-card.flipped { background: #FFF8E1; transform: scale(1.05); }
    .mem-card.matched { background: #E8F5E9; border-color: #388E3C; cursor: default; }

    /* NUMBERS */
    .num-display {
      text-align: center; line-height: 1.3;
      margin-bottom: 8px; min-height: 56px;
      font-size: clamp(28px, 6vw, 44px);
      letter-spacing: 2px;
    }
    .num-choices { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; max-width: 280px; margin: 0 auto; }
    .num-choice {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 3.5vw, 22px);
      padding: clamp(10px, 2.5vw, 16px);
      border: 3px solid #1565C0; border-radius: 8px;
      background: #1976D2; color: white;
      cursor: pointer; box-shadow: 0 3px 0 #1565C0;
      text-align: center; touch-action: manipulation;
    }
    .num-choice.correct { background: #388E3C; border-color: #1B5E20; }
    .num-choice.wrong { background: #C62828; border-color: #8B0000; animation: shake .4s; }

    /* LETTERS */
    .big-letter {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(48px, 10vw, 72px);
      color: #E53935;
      text-shadow: 3px 3px 0 #8B0000;
      text-align: center; line-height: 1.1;
    }
    .letter-hint { font-size: clamp(28px, 6vw, 42px); text-align: center; margin: 4px 0; }
    .letter-prompt { font-family: 'Press Start 2P', monospace; font-size: clamp(7px, 1.4vw, 9px); color: #555; text-align: center; margin-bottom: 10px; }
    .letter-choices { display: grid; gap: 7px; max-width: 320px; margin: 0 auto; }
    .letter-choice {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 2.2vw, 15px);
      padding: clamp(9px, 2vw, 13px) 4px;
      border: 3px solid #7B1FA2; border-radius: 8px;
      background: #9C27B0; color: white;
      cursor: pointer; box-shadow: 0 3px 0 #7B1FA2;
      text-align: center; touch-action: manipulation;
    }
    .letter-choice.correct { background: #388E3C; border-color: #1B5E20; }
    .letter-choice.wrong { background: #C62828; border-color: #8B0000; animation: shake .4s; }

    /* SHAPES */
    .shape-display { display: flex; justify-content: center; align-items: center; margin: 6px 0 10px; }
    .shape-svg { display: block; margin: 0 auto; }
    .shape-choices { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; max-width: 340px; margin: 0 auto; }
    .shape-choice {
      padding: 10px 6px;
      border: 3px solid #E65100; border-radius: 8px;
      background: #FF6F00; color: white;
      cursor: pointer; box-shadow: 0 3px 0 #BF360C;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.4vw, 9px);
      text-align: center; touch-action: manipulation;
    }
    .shape-choice.correct { background: #388E3C; border-color: #1B5E20; }
    .shape-choice.wrong { background: #C62828; border-color: #8B0000; animation: shake .4s; }
    .shape-mode-toggle { display: flex; justify-content: center; gap: 7px; margin-bottom: 10px; }
    .mode-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(6px, 1.3vw, 8px);
      padding: 6px 10px;
      border: 2px solid #8B0000; border-radius: 5px;
      cursor: pointer; background: #fff; color: #8B0000;
      touch-action: manipulation;
    }
    .mode-btn.active { background: #E53935; color: white; }

    /* SHARED */
    .feedback {
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.6vw, 10px);
      margin-top: 10px; min-height: 18px;
    }
    .feedback.good { color: #388E3C; }
    .feedback.bad { color: #C62828; }
    .score-row {
      text-align: center; margin-top: 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.4vw, 9px); color: #E53935;
    }
    .num-prompt { font-family: 'Press Start 2P', monospace; font-size: clamp(7px, 1.4vw, 9px); color: #555; text-align: center; margin-bottom: 10px; }

    .reset-btn {
      display: block; margin: 10px auto 0;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.4vw, 9px);
      padding: 10px 20px;
      background: #4CAF50; color: white;
      border: 3px solid #388E3C; border-radius: 6px;
      box-shadow: 0 3px 0 #388E3C;
      cursor: pointer; touch-action: manipulation;
    }
    .reset-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #388E3C; }

    @keyframes shake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);} }
    @keyframes bounce { 0%,100%{transform:translate(-50%,-50%);}50%{transform:translate(-50%,-58%);} }

    /* GROUND */
    .ground-deco {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 32px; background: #388E3C;
      display: flex; align-items: flex-start; padding-top: 2px;
      overflow: hidden; z-index: 1; flex-shrink: 0;
    }
    .block { width: 32px; height: 26px; background: #CD853F; border: 2px solid #8B4513; border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .pipe { width: 26px; height: 36px; background: #4CAF50; border: 2px solid #388E3C; border-radius: 4px 4px 0 0; flex-shrink: 0; margin-top: -8px; }

    /* CELEBRATION */
    .celebration { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 999; display: none; }
    .confetti-piece { position: absolute; border-radius: 2px; animation: fall 1.8s ease-in forwards; }
    .celeb-msg {
      position: absolute; top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 3.5vw, 20px);
      color: #FFD700; text-shadow: 2px 2px 0 #8B0000;
      text-align: center; line-height: 2; pointer-events: none;
      animation: bounce .5s infinite;
    }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0;} }
  </style>
</head>
<body>
<div class="app">
  <div class="clouds">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
  </div>

  <div class="header">
    <div class="title">⭐ OWEN'S WORLD ⭐</div>
    <div class="hud">
      <div class="hud-item"><span class="coin-spin">🪙</span> <span id="total-stars">0</span> STARS</div>
      <div class="hud-item">🔥 STREAK: <span id="streak">0</span></div>
      <div class="hud-item">❤️ LIVES: <span id="lives">❤️❤️❤️</span></div>
    </div>
    <div class="diff-bar">
      <button class="diff-btn active" onclick="setDiff('easy')">🟢 EASY</button>
      <button class="diff-btn" onclick="setDiff('medium')">🟡 MEDIUM</button>
      <button class="diff-btn" onclick="setDiff('hard')">🔴 HARD</button>
    </div>
  </div>

  <div class="main">
    <div class="nav-tabs">
      <button class="tab-btn active" onclick="switchTab('memory')">🍄<br>MEMORY</button>
      <button class="tab-btn" onclick="switchTab('numbers')">🔢<br>NUMBERS</button>
      <button class="tab-btn" onclick="switchTab('letters')">🔤<br>LETTERS</button>
      <button class="tab-btn" onclick="switchTab('shapes')">🔷<br>SHAPES</button>
    </div>

    <div class="panels">
      <!-- MEMORY -->
      <div class="game-panel active" id="panel-memory">
        <div class="game-title">🃏 MATCH THE PAIRS!</div>
        <div class="memory-grid" id="memory-grid"></div>
        <div class="score-row" id="mem-score">PAIRS: 0</div>
        <button class="reset-btn" onclick="initMemory()">▶ NEW GAME</button>
      </div>

      <!-- NUMBERS -->
      <div class="game-panel" id="panel-numbers">
        <div class="game-title">🌟 COUNT THE COINS!</div>
        <div class="num-display" id="num-display"></div>
        <div class="num-prompt" id="num-prompt">HOW MANY? PICK THE RIGHT NUMBER!</div>
        <div class="num-choices" id="num-choices"></div>
        <div class="feedback" id="num-feedback"></div>
        <div class="score-row" id="num-score">SCORE: 0</div>
      </div>

      <!-- LETTERS -->
      <div class="game-panel" id="panel-letters">
        <div class="game-title">🅰️ FIND THE LETTER!</div>
        <div class="letter-hint" id="letter-hint"></div>
        <div class="big-letter" id="big-letter"></div>
        <div class="letter-prompt" id="letter-prompt"></div>
        <div class="letter-choices" id="letter-choices"></div>
        <div class="feedback" id="letter-feedback"></div>
        <div class="score-row" id="letter-score">SCORE: 0</div>
      </div>

      <!-- SHAPES -->
      <div class="game-panel" id="panel-shapes">
        <div class="game-title">🔷 SHAPES & COLORS!</div>
        <div class="shape-mode-toggle">
          <button class="mode-btn active" id="modeShape" onclick="setShapeMode('shape')">SHAPE</button>
          <button class="mode-btn" id="modeColor" onclick="setShapeMode('color')">COLOR</button>
          <button class="mode-btn" id="modeBoth" onclick="setShapeMode('both')">BOTH</button>
        </div>
        <div class="shape-display" id="shape-display"></div>
        <div class="num-prompt" id="shape-prompt"></div>
        <div class="shape-choices" id="shape-choices"></div>
        <div class="feedback" id="shape-feedback"></div>
        <div class="score-row" id="shape-score">SCORE: 0</div>
      </div>
    </div>
  </div>

  <div class="ground-deco" id="ground-deco"></div>
</div>
<div class="celebration" id="celebration"></div>

<script>
// === AUDIO ===
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function playTone(freq,dur,type,vol){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=type||'square';o.frequency.setValueAtTime(freq,ac.currentTime);g.gain.setValueAtTime(vol||.13,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);o.start();o.stop(ac.currentTime+dur);}catch(e){}}
function sfxCorrect(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.12,'square',.12),i*80));}
function sfxWrong(){playTone(200,.3,'sawtooth',.1);setTimeout(()=>playTone(150,.3,'sawtooth',.1),150);}
function sfxFlip(){playTone(400,.05,'square',.08);}
function sfxMatch(){[659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.1,'square',.1),i*60));}
function sfxWin(){[523,523,523,392,523,659,392].forEach((f,i)=>setTimeout(()=>playTone(f,.15,'square',.15),i*120));}
function sfxStar(){[880,1100,1320].forEach((f,i)=>setTimeout(()=>playTone(f,.08,'sine',.12),i*50));}
function sfxStreak(){[659,784,988,1319].forEach((f,i)=>setTimeout(()=>playTone(f,.1,'square',.14),i*70));}

// === STATE ===
let totalStars=0,streak=0,livesLeft=3,difficulty='easy';
let numScoreVal=0,letterScoreVal=0,shapeScoreCount=0;

const diffSettings={
  easy:{memPairs:6,numMax:5,numChoices:4,letterChoices:4},
  medium:{memPairs:8,numMax:10,numChoices:4,letterChoices:6},
  hard:{memPairs:10,numMax:15,numChoices:5,letterChoices:8}
};

function setDiff(d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','medium','hard'][i]===d));
  livesLeft=3;updateHUD();
  initMemory();initNumbers();initLetters();initShapes();
}

function updateHUD(){
  document.getElementById('total-stars').textContent=totalStars;
  document.getElementById('streak').textContent=streak;
  document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,livesLeft));
}

function addStars(n){totalStars+=n;sfxStar();streak++;if(streak>0&&streak%3===0)sfxStreak();updateHUD();}
function loseLife(){livesLeft=Math.max(0,livesLeft-1);streak=0;updateHUD();if(livesLeft===0){setTimeout(()=>{livesLeft=3;updateHUD();celebrate('TRY AGAIN, OWEN! 💪');},800);}}

function switchTab(tab){
  getAC();
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['memory','numbers','letters','shapes'][i]===tab));
  document.querySelectorAll('.game-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

// === MEMORY ===
const marioEmojis=['🍄','⭐','🪙','🌺','🐢','👑','🔥','🌟','🏰','🎮'];
let memFlipped=[],memMatchedCount=0,memLocked=false,memTotal=0;

function initMemory(){
  memFlipped=[];memMatchedCount=0;memLocked=false;
  const cfg=diffSettings[difficulty];
  memTotal=cfg.memPairs;
  const cols=difficulty==='hard'?5:4;
  const pool=[...marioEmojis].slice(0,memTotal);
  const pairs=[...pool,...pool].sort(()=>Math.random()-.5);
  const grid=document.getElementById('memory-grid');
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.innerHTML='';
  pairs.forEach(emoji=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.emoji=emoji;
    card.innerHTML=`<div class="back">?</div><div class="front">${emoji}</div>`;
    card.addEventListener('click',()=>flipCard(card));
    grid.appendChild(card);
  });
  document.getElementById('mem-score').textContent=`PAIRS: 0 / ${memTotal}`;
}

function flipCard(card){
  if(memLocked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  sfxFlip();
  card.classList.add('flipped');
  memFlipped.push(card);
  if(memFlipped.length===2){
    memLocked=true;
    const[a,b]=memFlipped;
    if(a.dataset.emoji===b.dataset.emoji){
      setTimeout(()=>{a.classList.add('matched');b.classList.add('matched');memMatchedCount++;sfxMatch();document.getElementById('mem-score').textContent=`PAIRS: ${memMatchedCount} / ${memTotal}`;addStars(1);memFlipped=[];memLocked=false;if(memMatchedCount===memTotal){sfxWin();setTimeout(()=>celebrate('🎉 AMAZING OWEN! 🎉'),200);}},400);
    }else{
      setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');memFlipped=[];memLocked=false;loseLife();},900);
    }
  }
}

// === NUMBERS ===
const coinEmojis=['🪙','⭐','🍄','🌺','🐢'];
let numAnswer=0,numLocked=false;

function initNumbers(){
  numLocked=false;
  document.getElementById('num-feedback').textContent='';
  const cfg=diffSettings[difficulty];
  const container=document.getElementById('num-choices');
  container.innerHTML='';
  if(difficulty==='hard'){
    const a=Math.floor(Math.random()*6)+1,b=Math.floor(Math.random()*6)+1;
    numAnswer=a+b;
    document.getElementById('num-display').style.fontSize='clamp(28px,5vw,38px)';
    document.getElementById('num-display').textContent=`${a} + ${b} = ?`;
    document.getElementById('num-prompt').textContent='WHAT IS THE ANSWER?';
  }else{
    const count=Math.floor(Math.random()*cfg.numMax)+1;
    numAnswer=count;
    const emoji=coinEmojis[Math.floor(Math.random()*coinEmojis.length)];
    document.getElementById('num-display').textContent=emoji.repeat(count);
    document.getElementById('num-prompt').textContent='HOW MANY? PICK THE RIGHT NUMBER!';
  }
  const choices=new Set([numAnswer]);
  const max=diffSettings[difficulty].numMax+2;
  while(choices.size<cfg.numChoices)choices.add(Math.floor(Math.random()*max)+1);
  [...choices].sort(()=>Math.random()-.5).forEach(n=>{
    const btn=document.createElement('button');
    btn.className='num-choice';btn.textContent=n;
    btn.addEventListener('click',()=>checkNum(btn,n));
    container.appendChild(btn);
  });
}

function checkNum(btn,val){
  if(numLocked)return;numLocked=true;
  const fb=document.getElementById('num-feedback');
  if(val===numAnswer){btn.classList.add('correct');sfxCorrect();fb.textContent='⭐ GREAT JOB, OWEN! ⭐';fb.className='feedback good';numScoreVal++;document.getElementById('num-score').textContent='SCORE: '+numScoreVal;addStars(difficulty==='hard'?2:1);setTimeout(initNumbers,1200);}
  else{btn.classList.add('wrong');sfxWrong();fb.textContent='❌ TRY AGAIN!';fb.className='feedback bad';loseLife();setTimeout(()=>{btn.classList.remove('wrong');numLocked=false;fb.textContent='';},900);}
}

// === LETTERS ===
const letterData={A:{emoji:'🍎',word:'APPLE'},B:{emoji:'🍌',word:'BANANA'},C:{emoji:'🐱',word:'CAT'},D:{emoji:'🐶',word:'DOG'},E:{emoji:'🥚',word:'EGG'},F:{emoji:'🐸',word:'FROG'},G:{emoji:'🍇',word:'GRAPES'},H:{emoji:'🏠',word:'HOUSE'},I:{emoji:'🍦',word:'ICE CREAM'},J:{emoji:'🃏',word:'JOKER'},K:{emoji:'🦘',word:'KANGAROO'},L:{emoji:'🦁',word:'LION'},M:{emoji:'🍄',word:'MARIO'},N:{emoji:'🌙',word:'NIGHT'},O:{emoji:'🦉',word:'OWL'},P:{emoji:'🍕',word:'PIZZA'},Q:{emoji:'👑',word:'QUEEN'},R:{emoji:'🌈',word:'RAINBOW'},S:{emoji:'⭐',word:'STAR'},T:{emoji:'🐢',word:'TURTLE'},U:{emoji:'☂️',word:'UMBRELLA'},V:{emoji:'🎻',word:'VIOLIN'},W:{emoji:'🌊',word:'WAVE'},X:{emoji:'✖️',word:'X-RAY'},Y:{emoji:'🪀',word:'YO-YO'},Z:{emoji:'🦓',word:'ZEBRA'}};
let letterAnswer='',letterLocked=false;

function initLetters(){
  letterLocked=false;
  document.getElementById('letter-feedback').textContent='';
  const letters=Object.keys(letterData);
  letterAnswer=letters[Math.floor(Math.random()*letters.length)];
  const data=letterData[letterAnswer];
  const cfg=diffSettings[difficulty];
  document.getElementById('letter-hint').textContent=data.emoji;
  if(difficulty==='hard'){document.getElementById('big-letter').textContent='';document.getElementById('letter-prompt').textContent=`WHICH LETTER STARTS "${data.word}"?`;}
  else{document.getElementById('big-letter').textContent=letterAnswer;document.getElementById('letter-prompt').textContent=`FIND THE LETTER: ${letterAnswer}`;}
  const choices=new Set([letterAnswer]);
  while(choices.size<cfg.letterChoices)choices.add(letters[Math.floor(Math.random()*letters.length)]);
  const container=document.getElementById('letter-choices');
  container.style.gridTemplateColumns=`repeat(${cfg.letterChoices<=4?2:3},1fr)`;
  container.innerHTML='';
  [...choices].sort(()=>Math.random()-.5).forEach(l=>{
    const btn=document.createElement('button');
    btn.className='letter-choice';btn.textContent=l;
    btn.addEventListener('click',()=>checkLetter(btn,l));
    container.appendChild(btn);
  });
}

function checkLetter(btn,val){
  if(letterLocked)return;letterLocked=true;
  const fb=document.getElementById('letter-feedback');
  if(val===letterAnswer){btn.classList.add('correct');sfxCorrect();fb.textContent='⭐ PERFECT, OWEN! ⭐';fb.className='feedback good';letterScoreVal++;document.getElementById('letter-score').textContent='SCORE: '+letterScoreVal;addStars(difficulty==='hard'?2:1);setTimeout(initLetters,1200);}
  else{btn.classList.add('wrong');sfxWrong();fb.textContent='❌ NOT QUITE!';fb.className='feedback bad';loseLife();setTimeout(()=>{btn.classList.remove('wrong');letterLocked=false;fb.textContent='';},900);}
}

// === SHAPES ===
const shapeTypes=['circle','square','triangle','rectangle','star','heart'];
const colorList=[{name:'RED',hex:'#E53935'},{name:'BLUE',hex:'#1976D2'},{name:'GREEN',hex:'#388E3C'},{name:'YELLOW',hex:'#F9A825'},{name:'PURPLE',hex:'#7B1FA2'},{name:'ORANGE',hex:'#E65100'},{name:'PINK',hex:'#E91E63'},{name:'BROWN',hex:'#6D4C41'}];
let shapeAnswer='',shapeColorAnswer='',shapeLocked=false,shapeMode='shape';

function setShapeMode(m){
  shapeMode=m;
  ['shape','color','both'].forEach(x=>{const id='mode'+x.charAt(0).toUpperCase()+x.slice(1);document.getElementById(id).classList.toggle('active',x===m);});
  initShapes();
}

function drawShape(shape,color,size){
  size=size||90;const s=size;
  if(shape==='circle')return`<svg width="${s}" height="${s}"><circle cx="${s/2}" cy="${s/2}" r="${s/2-3}" fill="${color}" stroke="#333" stroke-width="2"/></svg>`;
  if(shape==='square')return`<svg width="${s}" height="${s}"><rect x="3" y="3" width="${s-6}" height="${s-6}" fill="${color}" rx="4" stroke="#333" stroke-width="2"/></svg>`;
  if(shape==='triangle')return`<svg width="${s}" height="${s}"><polygon points="${s/2},3 ${s-3},${s-3} 3,${s-3}" fill="${color}" stroke="#333" stroke-width="2"/></svg>`;
  if(shape==='rectangle')return`<svg width="${s*1.5}" height="${s*0.65}"><rect x="3" y="3" width="${s*1.5-6}" height="${s*0.65-6}" fill="${color}" rx="4" stroke="#333" stroke-width="2"/></svg>`;
  if(shape==='star'){const cx=s/2,cy=s/2,r1=s/2-3,r2=r1*0.4;let pts='';for(let i=0;i<10;i++){const ang=(i*Math.PI/5)-Math.PI/2,r=i%2===0?r1:r2;pts+=`${cx+r*Math.cos(ang)},${cy+r*Math.sin(ang)} `;}return`<svg width="${s}" height="${s}"><polygon points="${pts.trim()}" fill="${color}" stroke="#333" stroke-width="2"/></svg>`;}
  if(shape==='heart'){const hw=s-6,hh=s-6,hx=3,hy=3;return`<svg width="${s}" height="${s}"><path d="M ${hx+hw/2} ${hy+hh*0.3} C ${hx+hw/2} ${hy} ${hx} ${hy} ${hx} ${hy+hh*0.3} C ${hx} ${hy+hh*0.6} ${hx+hw/2} ${hy+hh*0.9} ${hx+hw/2} ${hy+hh} C ${hx+hw/2} ${hy+hh*0.9} ${hx+hw} ${hy+hh*0.6} ${hx+hw} ${hy+hh*0.3} C ${hx+hw} ${hy} ${hx+hw/2} ${hy} ${hx+hw/2} ${hy+hh*0.3} Z" fill="${color}" stroke="#333" stroke-width="2"/></svg>`;}
  return '';
}

function initShapes(){
  shapeLocked=false;
  document.getElementById('shape-feedback').textContent='';
  const cfg=diffSettings[difficulty];
  const poolSize=difficulty==='easy'?4:difficulty==='medium'?5:6;
  const colorPoolSize=difficulty==='easy'?4:difficulty==='medium'?6:8;
  const shape=shapeTypes[Math.floor(Math.random()*poolSize)];
  const color=colorList[Math.floor(Math.random()*colorPoolSize)];
  shapeAnswer=shape;shapeColorAnswer=color.name;
  document.getElementById('shape-display').innerHTML=drawShape(shape,color.hex,100);
  const container=document.getElementById('shape-choices');
  container.innerHTML='';
  if(shapeMode==='shape'){
    document.getElementById('shape-prompt').textContent='WHAT SHAPE IS THIS?';
    const opts=new Set([shape]);
    while(opts.size<4)opts.add(shapeTypes[Math.floor(Math.random()*poolSize)]);
    [...opts].sort(()=>Math.random()-.5).forEach(s=>{const btn=document.createElement('button');btn.className='shape-choice';btn.innerHTML=drawShape(s,'#999',30)+`<span>${s.toUpperCase()}</span>`;btn.addEventListener('click',()=>checkShape(btn,s,'shape'));container.appendChild(btn);});
  }else if(shapeMode==='color'){
    document.getElementById('shape-prompt').textContent='WHAT COLOR IS THIS?';
    const opts=new Set([color.name]);
    while(opts.size<4)opts.add(colorList[Math.floor(Math.random()*colorPoolSize)].name);
    [...opts].sort(()=>Math.random()-.5).forEach(cn=>{const c=colorList.find(x=>x.name===cn);const btn=document.createElement('button');btn.className='shape-choice';btn.style.background=c.hex;btn.style.borderColor=c.hex;btn.innerHTML=`<span>${cn}</span>`;btn.addEventListener('click',()=>checkShape(btn,cn,'color'));container.appendChild(btn);});
  }else{
    document.getElementById('shape-prompt').textContent='WHAT SHAPE AND COLOR?';
    const key=shape+'|'+color.name;
    const opts=new Set([key]);
    while(opts.size<4){const rs=shapeTypes[Math.floor(Math.random()*poolSize)];const rc=colorList[Math.floor(Math.random()*colorPoolSize)];opts.add(rs+'|'+rc.name);}
    [...opts].sort(()=>Math.random()-.5).forEach(k=>{const[s,cn]=k.split('|');const c=colorList.find(x=>x.name===cn);const btn=document.createElement('button');btn.className='shape-choice';btn.innerHTML=drawShape(s,c.hex,26)+`<span style="font-size:7px">${cn} ${s.toUpperCase()}</span>`;btn.addEventListener('click',()=>checkShape(btn,k,'both'));container.appendChild(btn);});
  }
}

function checkShape(btn,val,mode){
  if(shapeLocked)return;shapeLocked=true;
  const fb=document.getElementById('shape-feedback');
  const correct=(mode==='shape'&&val===shapeAnswer)||(mode==='color'&&val===shapeColorAnswer)||(mode==='both'&&val===shapeAnswer+'|'+shapeColorAnswer);
  if(correct){btn.classList.add('correct');sfxCorrect();fb.textContent='⭐ YOU GOT IT, OWEN! ⭐';fb.className='feedback good';shapeScoreCount++;document.getElementById('shape-score').textContent='SCORE: '+shapeScoreCount;addStars(mode==='both'?2:1);setTimeout(initShapes,1200);}
  else{btn.classList.add('wrong');sfxWrong();fb.textContent='❌ OOPS! TRY AGAIN!';fb.className='feedback bad';loseLife();setTimeout(()=>{btn.classList.remove('wrong');shapeLocked=false;fb.textContent='';},900);}
}

// === CELEBRATE ===
function celebrate(msg){
  const el=document.getElementById('celebration');el.style.display='block';el.innerHTML='';
  const colors=['#FFD700','#E53935','#4CAF50','#1976D2','#9C27B0','#FF9800','#00BCD4'];
  for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;animation-delay:${Math.random()*.8}s;animation-duration:${1.2+Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'3px'};`;el.appendChild(p);}
  const label=document.createElement('div');label.className='celeb-msg';label.textContent=msg;el.appendChild(label);
  sfxWin();
  setTimeout(()=>{el.style.display='none';},3500);
}

// === GROUND ===
function buildGround(){
  const g=document.getElementById('ground-deco');
  ['🍄','⭐','?','🪙','?','🌺','?','⭐','🍄','🪙','?','⭐','🌺','?','🍄','⭐','🪙','?','🍄'].forEach((icon,i)=>{
    if(i%5===3){const p=document.createElement('div');p.className='pipe';g.appendChild(p);}
    else{const b=document.createElement('div');b.className='block';b.textContent=icon;g.appendChild(b);}
  });
}

document.addEventListener('touchstart',()=>getAC(),{once:true});
document.addEventListener('click',()=>getAC(),{once:true});
buildGround();
initMemory();initNumbers();initLetters();initShapes();
</script>
</body>
